<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrace | PyBox</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for message in messages %}
                        <div class="alert">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="card">
            <h2>Vytvořit nový účet 👤</h2>
            <p>Vyplňte údaje níže pro registraci do vaší galerie.</p>
            
            <form action="{{ url_for('registrace') }}" method="POST">
                <div style="margin-bottom: 15px;">
                    <label for="jmeno" style="display: block; margin-bottom: 5px; font-weight: bold; color: #374151;">Jméno:</label>
                    <input type="text" id="jmeno" name="jmeno" placeholder="Vaše jméno nebo přezdívka" required>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label for="email" style="display: block; margin-bottom: 5px; font-weight: bold; color: #374151;">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="vas@email.cz" required>
                </div>
                
                <div style="margin-bottom: 25px;">
                    <label for="heslo" style="display: block; margin-bottom: 5px; font-weight: bold; color: #374151;">Heslo:</label>
                    <input type="password" id="heslo" name="heslo" placeholder="Tajuplné heslo" required>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">Zaregistrovat se</button>
            </form>
            
            <div style="margin-top: 20px;">
                <p>Už máte účet? <a href="{{ url_for('prihlaseni') }}" style="color: #3b82f6; text-decoration: none; font-weight: bold;">Přihlaste se zde</a>.</p>
                <br>
                <a href="{{ url_for('index') }}" class="btn btn-outline">Zpět na úvod</a>
            </div>
        </div>
    </div>
</body>
</html>
