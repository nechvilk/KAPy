{% extends "base.html" %}
{% block title %}Přihlášení | PyBox{% endblock %}
{% block content %}

        <div class="card">
            <h2>Přihlášení 🔐</h2>
            <p>Vítejte zpět! Zadejte svůj e-mail a heslo pro přístup k fotkám.</p>
            
            <form id="prihlasovaci-form">
                <div style="margin-bottom: 15px;">
                    <label for="email" style="display: block; margin-bottom: 5px; font-weight: bold; color: #374151;">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="vas@email.cz" required>
                </div>
                
                <div style="margin-bottom: 25px;">
                    <label for="heslo" style="display: block; margin-bottom: 5px; font-weight: bold; color: #374151;">Heslo:</label>
                    <input type="password" id="heslo" name="heslo" placeholder="Vaše heslo" required>
                </div>
                
                <button type="submit" id="prihl-tlacitko" class="btn" style="width: 100%;">Přihlásit se</button>
            </form>
            
            <div style="margin-top: 20px;">
                <p>Ještě nemáte účet? <a href="{{ url_for('registrace') }}" style="color: #3b82f6; text-decoration: none; font-weight: bold;">Zaregistrujte se</a>.</p>
                <br>
                <a href="{{ url_for('index') }}" class="btn btn-outline">Zpět na úvod</a>
            </div>
        </div>

{% endblock %}
